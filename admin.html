<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Divyam Raj</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <h1>Admin Login</h1>
            <p>Please enter your email to continue</p>
            <div class="form-group">
                <input type="email" id="login-email" placeholder="Email Address">
            </div>
            <div class="form-group">
                <input type="password" id="login-password" placeholder="Password">
            </div>
            <button id="login-btn" class="btn-save">Login</button>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>
    <div class="admin-wrapper" id="admin-wrapper" style="display: none;">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Admin.</h2>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-tab="hero">Hero Section</button>
                <button class="nav-item" data-tab="about">About Section</button>
                <button class="nav-item" data-tab="experience">Experience</button>
                <button class="nav-item" data-tab="portfolio">Portfolio</button>
                <button class="nav-item" data-tab="skills">Skills</button>
                <button class="nav-item" data-tab="contact">Contact</button>
                <button class="nav-item" data-tab="security">Security</button>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn-logout">Logout</button>
                <button id="export-json" class="btn-export">Download Backup (JSON)</button>
                <p class="last-saved" id="last-saved">Never saved yet</p>
                <button id="save-all" class="btn-save">Apply All Changes</button>
                <p class="status-msg" id="status-msg"></p>
            </div>
        </aside>

        <main class="content-area">
            <header class="top-bar">
                <div class="header-left">
                    <h1 id="tab-title">Hero Section</h1>
                    <div id="dashboard-stats" class="dashboard-stats">
                        <!-- Stats injected by admin.js -->
                    </div>
                </div>
                <div class="top-actions">
                    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </button>
                    <a href="index.html" target="_blank" class="btn-preview">View Website</a>
                </div>
            </header>

            <section id="tab-content" class="tab-content">
                <!-- Form fields will be injected here by admin.js -->
            </section>
        </main>
    </div>

    <!-- Modals for complex list items -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title">Edit Item</h2>
            <div id="modal-form"></div>
            <div class="modal-footer">
                <button id="modal-save" class="btn-save">Save Item</button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
